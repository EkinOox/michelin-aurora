server {
    listen 8080;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 20m;

    location / {
        # Réponse directe aux requêtes preflight CORS, avant qu'elles n'atteignent
        # le routeur Symfony (qui n'a pas de route OPTIONS et renverrait 405).
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_buffering off;
        fastcgi_read_timeout 3600s;
    }

    # "always" : ces headers doivent aussi être renvoyés sur les réponses
    # d'erreur (401/404/...), sinon le navigateur masque l'erreur réelle
    # derrière une erreur CORS généralisée.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
}
