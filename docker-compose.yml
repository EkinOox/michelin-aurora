services:

  # ── Conteneur 1 : Back-End Symfony 7 ──────────────────────────────────────
  back:
    build:
      context: ./apps/back
      target: dev
    environment:
      APP_ENV: ${APP_ENV}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${BACK_PORT:-8081}:8080"
    volumes:
      # Code monté en live : pas de rebuild pour voir ses modifs.
      - ./apps/back:/var/www/html
      # Volumes nommés : préservent les deps/cache générés dans le conteneur,
      # sans être écrasés par l'hôte (qui n'a ni vendor/ ni var/).
      - back_vendor:/var/www/html/vendor
      - back_var:/var/www/html/var
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aurora

  # ── Conteneur 2 : PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aurora

  # ── Conteneur 3 : PgAdmin ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - aurora

  # ── Conteneur 4 : Front-End Nuxt 3 ────────────────────────────────────────
  front:
    build:
      context: ./apps/front
      target: dev
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_BASE_INTERNAL: http://back:8080
    ports:
      - "${FRONT_PORT:-3001}:3000"
    volumes:
      # Code monté en live (HMR Nuxt) sans rebuild.
      - ./apps/front:/app
      # Volume nommé : préserve node_modules installé dans le conteneur.
      - front_node_modules:/app/node_modules
    depends_on:
      - back
    networks:
      - aurora

volumes:
  pg_data:
  back_vendor:
  back_var:
  front_node_modules:

networks:
  aurora:
    driver: bridge
