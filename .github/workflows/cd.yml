name: CD — Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  push-images:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Back image ──────────────────────────────────────────────────────────
      - name: Extract back metadata
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/michelin-aurora-back
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push back
        uses: docker/build-push-action@v6
        with:
          context: apps/back
          target: dev
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}
          cache-from: type=gha,scope=back
          cache-to: type=gha,scope=back,mode=max

      # ── Front image ─────────────────────────────────────────────────────────
      - name: Extract front metadata
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/michelin-aurora-front
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push front
        uses: docker/build-push-action@v6
        with:
          context: apps/front
          target: dev
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}
          cache-from: type=gha,scope=front
          cache-to: type=gha,scope=front,mode=max
