name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Back-End : Symfony 7 ────────────────────────────────────────────────────
  back:
    name: Back — PHP lint & composer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/back

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/back/vendor
          key: composer-${{ hashFiles('apps/back/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHP syntax check
        run: find src -name "*.php" -exec php -l {} \; | grep -v "^No syntax errors"  || true

  # ── Front-End : Nuxt 4 ─────────────────────────────────────────────────────
  front:
    name: Front — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Nuxt types
        run: npm run postinstall

      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8081
          NUXT_API_BASE_INTERNAL: http://back:8080

  # ── Docker : vérification que les images buildent ──────────────────────────
  docker-build:
    name: Docker — build check
    runs-on: ubuntu-latest
    needs: [back, front]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build back image
        uses: docker/build-push-action@v6
        with:
          context: apps/back
          target: dev
          push: false
          cache-from: type=gha,scope=back
          cache-to: type=gha,scope=back,mode=max

      - name: Build front image
        uses: docker/build-push-action@v6
        with:
          context: apps/front
          target: dev
          push: false
          cache-from: type=gha,scope=front
          cache-to: type=gha,scope=front,mode=max
