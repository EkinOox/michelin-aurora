name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Back-End : Symfony 7 ────────────────────────────────────────────────────
  back:
    name: Back — PHP lint & PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/back

    # Base de test PostgreSQL, accessible sur 127.0.0.1 (DATABASE_URL surchargé
    # au niveau du step PHPUnit, car le .env committé vise le host docker `db`).
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: aurora
          POSTGRES_DB: aurora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aurora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, ctype, iconv
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/back/vendor
          key: composer-${{ hashFiles('apps/back/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHP syntax check
        run: find src -name "*.php" -exec php -l {} \; | grep -v "^No syntax errors"  || true

      - name: PHPUnit
        # phpunit.dist.xml force APP_ENV=test ; bootstrap.php charge .env puis .env.test.
        # Le .env committé pointe sur le host docker `db` ; en CI on cible le
        # service postgres sur 127.0.0.1 (les vars d'env réelles priment sur .env).
        run: php vendor/bin/phpunit
        env:
          DATABASE_URL: postgresql://aurora:aurora@127.0.0.1:5432/aurora?serverVersion=16

  # ── Front-End : Nuxt 4 ─────────────────────────────────────────────────────
  front:
    name: Front — Vitest & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Nuxt types
        run: npm run postinstall

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8081
          NUXT_API_BASE_INTERNAL: http://back:8080

  # ── Docker : vérification que les images buildent ──────────────────────────
  docker-build:
    name: Docker — build check
    runs-on: ubuntu-latest
    needs: [back, front]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build back image
        uses: docker/build-push-action@v6
        with:
          context: apps/back
          target: dev
          push: false
          cache-from: type=gha,scope=back
          cache-to: type=gha,scope=back,mode=max

      - name: Build front image
        uses: docker/build-push-action@v6
        with:
          context: apps/front
          target: dev
          push: false
          cache-from: type=gha,scope=front
          cache-to: type=gha,scope=front,mode=max
